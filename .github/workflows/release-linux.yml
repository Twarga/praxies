name: Linux release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    env:
      HAS_SIGNING_KEY: ${{ secrets.PRAXIS_MINISIGN_SECRET_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v6
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install release runtime dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y xvfb xauth libgtk-3-0 libnss3 libasound2t64 libxss1 libgbm1
      - name: Build and verify release
        env:
          PRAXIS_CONTAINER_RUNTIME_BUILD: "0"
          PRAXIS_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: xvfb-run -a ./scripts/release-linux.sh
      - name: Sign AppImage
        if: env.HAS_SIGNING_KEY == 'true'
        env:
          PRAXIS_MINISIGN_SECRET_KEY_B64: ${{ secrets.PRAXIS_MINISIGN_SECRET_KEY }}
          PRAXIS_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y minisign
          printf '%s' "$PRAXIS_MINISIGN_SECRET_KEY_B64" | base64 --decode > "$RUNNER_TEMP/minisign.key"
          PRAXIS_MINISIGN_SECRET_KEY="$RUNNER_TEMP/minisign.key" ./scripts/generate-release-metadata.sh
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-linux-x86_64
          path: |
            frontend/release/Praxis-*.AppImage
            frontend/release/Praxis-*.AppImage.sha256
            frontend/release/Praxis-*.AppImage.minisig
            frontend/release/latest-linux.json
          if-no-files-found: error
      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            frontend/release/Praxis-*.AppImage
            frontend/release/Praxis-*.AppImage.sha256
            frontend/release/Praxis-*.AppImage.minisig
            frontend/release/latest-linux.json
