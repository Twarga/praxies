name: Feature request
description: Suggest an improvement or a new capability.
title: "[Feature] <short summary>"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please skim `SCOPE.md` to see
        whether the idea aligns with the current product direction.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like Praxis to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways the problem could be solved.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Screenshots, mockups, related issues, or any other context.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked SCOPE.md and this request does not conflict with a declared non-goal.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
